version: "3"

tasks:
  lint:
    desc: Run formatters + linters with autofix (mutates files)
    cmds:
      - golangci-lint fmt
      - golangci-lint run --fix

  ci:
    desc: Read-only fmt + lint verification for CI (fail-fast)
    cmds:
      - golangci-lint fmt --diff
      - golangci-lint run

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Local composite — lint (mutating) + tests
    cmds:
      - task: lint
      - task: test

  build:
    desc: Local snapshot release (validates GoReleaser config; no publish)
    cmds:
      - goreleaser release --snapshot --clean --skip=publish

  release:
    desc: Tagged release via GoReleaser — GitHub Release + changelog (CI)
    cmds:
      - goreleaser release --clean

  update:
    desc: Pull latest go-scaffolds v1 template tooling (3-way merge; source untouched; no prompts)
    cmds:
      - uvx copier update --defaults --vcs-ref v1
